format = """
$directory\
${custom.git_indicator}  \
$git_branch\
$git_status\
$line_break\
$character"""

add_newline = true
palette = 'gruvbox'

[directory]
style = 'bold fg:dir_color'
format = '[$path ]($style)'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[custom.git_indicator]
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
command = 'echo ""'
format = '[$output]($style)'
style = 'bold fg:git_color'

[git_branch]
style = 'fg:git_color'
always_show_remote = true
symbol = ' '
format = '[$symbol$branch(:$remote_branch)]($style)'

[git_status]
style = 'fg:git_color'
format = ' [\($all_status$ahead_behind\)]($style)'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
up_to_date = '✓'

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[palettes.nord]
dir_color = '#5E81AC' # dark_blue
git_color = '#B48EAD' # purple

[palettes.gruvbox]
# see https://github.com/ellisonleao/gruvbox.nvim/blob/main/lua/gruvbox.lua
dir_color = '#d79921' # neutral_yellow
git_color = '#fe8019' # dark_orange
